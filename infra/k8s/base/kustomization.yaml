apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - qdrant.yaml
  - backend.yaml
  - celery-worker.yaml
  - frontend.yaml
  - ingress.yaml

configMapGenerator:
  - name: freightgpt-config
    literals:
      - ENV=production
      - LOG_LEVEL=INFO

secretGenerator:
  - name: freightgpt-secrets
    literals:
      - SECRET_KEY=change-this-in-production
      - POSTGRES_PASSWORD=postgres
