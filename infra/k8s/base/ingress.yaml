apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freightgpt-ingress
  namespace: freightgpt
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  tls:
    - hosts:
        - app.freightgpt.ae
        - api.freightgpt.ae
      secretName: freightgpt-tls
  rules:
    - host: app.freightgpt.ae
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    - host: api.freightgpt.ae
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
