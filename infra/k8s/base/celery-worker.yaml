apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: freightgpt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: freightgpt/celery-worker:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres:5432/freightgpt
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
